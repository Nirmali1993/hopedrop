name: hopedrop
description: HopeDrop - Blood Donation App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_map: ^7.0.1
  latlong2: ^0.9.0
  geolocator: ^13.0.2

  geocoding: ^3.0.0

  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  http: ^1.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Photo picker
  image_picker: ^1.1.2

  # Phone call
  url_launcher: ^6.3.1

  # Utilities
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/